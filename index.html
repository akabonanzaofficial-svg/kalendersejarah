        const calculateConversions = (mathYear) => {
            if (!mathYear && mathYear !== 0) return { m: "", h: "" };
            const y = parseInt(mathYear);
            let mStr = y > 0 ? `${y} M` : `${Math.abs(y)} SM`;
            if (y === 0) mStr = "1 SM"; 

            // Rumus estimasi tahun Hijriah relatif terhadap awal Hijrah (622 M)
            const hYearExact = (y - 621.5774) * 1.030684; 
            let hStr = "";
            if (hYearExact >= 0) {
                hStr = `${Math.floor(hYearExact) + 1} H`;
            } else {
                hStr = `${Math.floor(Math.abs(hYearExact))} SH`; 
            }
            return { m: mStr, h: hStr };
        };

            useEffect(() => {
                const closeMenu = () => { if (isOpen) setIsOpen(false); };
                if (isOpen) window.addEventListener('click', closeMenu);

        const TimelineView = ({ items, eras, onCardClick }) => {
            const [activeFilter, setActiveFilter] = useState('Semua'); 
            const [searchQuery, setSearchQuery] = useState('');

            const displayItems = items.filter(item => {
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const title = item.type === 'event' ? item.data.title : item.data.name;
                    const desc = item.data.description || '';
                    const cat = item.data.category || '';
                    
                    let yearM = '';
                    let yearH = '';
                    if (item.type === 'event') {
                        yearM = item.data.displayM || '';
                        yearH = item.data.displayH || '';
                    } else if (item.type === 'birth') {
                        yearM = item.data.displayBirthM || '';
                        yearH = item.data.displayBirthH || '';
                    } else if (item.type === 'death') {
                        yearM = item.data.displayDeathM || '';
                        yearH = item.data.displayDeathH || '';
                    }

                    const descMatch = desc.toLowerCase().includes(q);
                    const catMatch = cat.toLowerCase().includes(q);
                    const yearMatch = yearM.toLowerCase().includes(q);
                    const hMatch = yearH.toLowerCase().includes(q);

                    if (!(titleMatch || descMatch || catMatch || yearMatch || hMatch)) return false;
                }
                if (activeFilter === 'Semua') return true;
                const cat = item.data.category ? item.data.category.toLowerCase() : '';

                if (activeFilter === 'Nusantara' && cat.includes('nusantara')) return true;

                            const targetYear = item.type === 'event' ? item.yearMath : (item.type === 'birth' ? item.data.birthMath : item.data.deathMath);
                            const isSameYearAsPrevious = lastYear === targetYear;
                            lastYear = targetYear;

                            return (
                                <div key={index} className={`relative flex flex-col md:flex-row items-center w-full group ${isSameYearAsPrevious ? 'mb-2' : 'mb-8'}`}>

                                    <div className="hidden md:flex w-1/2 justify-end pr-8 text-right flex-col">

        const DateConverterView = ({ onBack }) => {
            const [masehiDate, setMasehiDate] = useState('');
            const [hijriOffset, setHijriOffset] = useState(0);

            const computedData = useMemo(() => {
                if (!masehiDate) return null;
                try {
                    const dateObj = new Date(masehiDate);
                    const dayStr = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(dateObj);
                    const masehiFormatted = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(dateObj);
                    
                    const adjustedDate = new Date(dateObj);
                    adjustedDate.setDate(adjustedDate.getDate() + hijriOffset);
                    
                    const parts = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', { day: 'numeric', month: 'numeric', year: 'numeric' }).formatToParts(adjustedDate);
                    
                    const getPartValue = (type) => {
                        const found = parts.find(p => p.type === type);
                        return found ? found.value : '';
                    };

                    const hDay = getPartValue('day');
                    const hMonthNum = parseInt(getPartValue('month') || '1', 10);
                    const hYear = getPartValue('year').replace(/\D/g, ''); 
                    
                    const namaBulanHijriah = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Sya'ban", "Ramadhan", "Syawal", "Zulqaidah", "Zulhijjah"];
                    
                    const validatedMonthIndex = isNaN(hMonthNum) || hMonthNum < 1 || hMonthNum > 12 ? 0 : hMonthNum - 1;
                    const hijriahFormatted = `${hDay} ${namaBulanHijriah[validatedMonthIndex]} ${hYear} H`;

                    return { dayStr, masehiFormatted, hijriahFormatted };
                } catch (err) {
                    console.error("Format Intl Hijriah Gagal, menggunakan estimasi kasar: ", err);
                    const dateObj = new Date(masehiDate);
                    const dayStr = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(dateObj);
                    const masehiFormatted = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(dateObj);
                    const estimate = calculateConversions(dateObj.getFullYear() + hijriOffset);
                    return { dayStr, masehiFormatted, hijriahFormatted: `Pertengahan Tahun ${estimate.h}` };
                }

                    if(f.deathMath) items.push({ type: 'death', yearMath: f.deathMath, data: f });

                return items.sort((a, b) => a.yearMath - b.yearMath);

                const adminPassword = window.prompt("Otorisasi Admin: Masukkan Password untuk menyimpan data ke Cloud.");
                if (!adminPassword) return; // Batal jika kosong/cancel

                setSyncStatus('Menyimpan ke Cloud...');

                try {
                    // 2. Mengirim POST request ke Google Sheets
                    const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 'text/plain' menghindari masalah CORS preflight
                        body: JSON.stringify({
                            password: adminPassword,
                            action: `add_${type}`,
                            data: data
                        })
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        // 3. Update tampilan lokal jika berhasil

                        if (type === 'event') setEvents([...events, newItem]);
                        if (type === 'figure') setFigures([...figures, newItem]);
                        if (type === 'era') setEras([...eras, newItem]);
                        
                        setSyncStatus('Tersimpan di Cloud!');

                    } else {
                        // 4. Jika password salah atau gagal
                        alert("Gagal Menyimpan: " + result.message);
                        setSyncStatus('');

                             <button onClick={() => handleMenuChange('form_era')} className="text-white bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors" title="Tambah Era"><IconDatabase /></button>
                        </div>

                                {activeMenu === 'figures' && <FiguresList items={figures} onCardClick={item => setSelectedItem({type: 'birth', data: item, yearMath: item.birthMath})} onBack={() => handleMenuChange('alat_home')} />}

                                <span className="text-[10px] font-bold mt-1">Mesin Waktu</span>
                            </button>
                            <button onClick={() => handleMenuChange('alat_home')} className={`flex flex-col items-center justify-center w-full h-full transition-all ${isAlatActive ? 'text-white scale-110 font-bold' : 'text-orange-200 hover:text-white'}`}>
                                <IconGrid />
                                <span className="text-[10px] font-bold mt-1">Alat</span>
                            </button>
                        </div>
                    </nav>

                    <SmartEdgeMenu onNavigate={handleMenuChange} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
