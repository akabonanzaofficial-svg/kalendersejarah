<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAMANIA Kalender Sejarah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zamania: {
                            50: '#fffcf9', 100: '#ffedd5', 500: '#f97316',
                            600: '#ea580c', 800: '#7c2d12', 900: '#431407',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fffcf9; overflow: hidden; }
        .scrollable-content { overflow-y: auto; height: calc(100vh - 130px); }
        .timeline-line::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background-color: #fed7aa; transform: translateX(-50%); z-index: 0; }
        @media (max-width: 768px) { .timeline-line::before { left: 24px; } .scrollable-content { height: calc(100vh - 140px); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: #f97316; cursor: pointer; margin-top: -7px; box-shadow: 0 2px 5px rgba(234, 88, 12, 0.3); border: 2px solid white; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #ffedd5; border-radius: 4px; }
        .bottom-nav-shadow { box-shadow: 0 -4px 20px rgba(234,88,12,0.12); }
        
        .ql-container.ql-snow { border: none !important; border-top: 1px solid #ffedd5 !important; }
        .ql-toolbar.ql-snow { border: none !important; background-color: #fffcf9; font-family: inherit; }
        .ql-editor { min-height: 150px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 1rem; }
        
        .rich-content p { margin-bottom: 0.75em; line-height: 1.6; }
        .rich-content strong { font-weight: 700; color: #431407; }
        .rich-content em { font-style: italic; }
        .rich-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .rich-content ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .rich-content a { color: #ea580c; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // URL GOOGLE APPS SCRIPT ANDA
        const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1icTDTXxIr9hdolaXZl6CCLqcsmvkAIqy11D50-6qhqsOS5Us0RHQ81Q7eTFaduX_WQ/exec";

        // --- CUSTOM QUILL WRAPPER (Diperbaiki agar teks tidak hilang) ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
            const editorRef = useRef(null);
            const quillRef = useRef(null);

            useEffect(() => {
                if (typeof window !== 'undefined' && window.Quill && editorRef.current && !quillRef.current) {
                    quillRef.current = new window.Quill(editorRef.current, {
                        theme: 'snow',
                        placeholder: placeholder || 'Ketik di sini...',
                        modules: { toolbar: [ ['bold', 'italic', 'underline', 'strike'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['link'], ['clean'] ] }
                    });
                    
                    // Set nilai awal
                    if (value) quillRef.current.clipboard.dangerouslyPasteHTML(value);

                    // Dengarkan ketikan manual user
                    quillRef.current.on('text-change', (delta, oldDelta, source) => {
                        if (source === 'user') {
                            const html = quillRef.current.root.innerHTML;
                            onChange(html === '<p><br></p>' ? '' : html);
                        }
                    });
                }
            }, []);

            // Pantau perubahan dari luar (contohnya saat AI Auto-Fill bekerja)
            useEffect(() => {
                if (quillRef.current && value !== undefined) {
                    const currentHtml = quillRef.current.root.innerHTML;
                    // Hanya timpa isi editor jika nilainya BENAR-BENAR berbeda (bukan karena diketik)
                    if (value !== currentHtml && value !== '<p><br></p>') {
                        if (value === '' || value === null) {
                             quillRef.current.setText('');
                        } else {
                             const currentSelection = quillRef.current.getSelection();
                             quillRef.current.clipboard.dangerouslyPasteHTML(value);
                             // Kembalikan posisi kursor agar tidak melompat
                             if(currentSelection) quillRef.current.setSelection(currentSelection.index, currentSelection.length);
                        }
                    }
                }
            }, [value]);

            if (typeof window !== 'undefined' && !window.Quill) {
                return <textarea value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder || "Ketik manual..."} className="w-full p-3 border border-orange-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-500" rows="6" />;
            }

            return <div className="bg-white border border-orange-200 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-orange-500 transition-all"><div ref={editorRef}></div></div>;
        };

        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconCpu = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconGrid = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>;
        const IconDatabase = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;

        const stripHtml = (html) => { if (!html) return ''; let doc = new DOMParser().parseFromString(html, 'text/html'); return doc.body.textContent || ""; };

        const calculateConversions = (mathYear) => {
            if (!mathYear && mathYear !== 0) return { m: "", h: "" };
            const y = parseInt(mathYear);
            let mStr = y > 0 ? `${y} M` : `${Math.abs(y)} SM`;
            if (y === 0) mStr = "1 SM"; 
            const hYearExact = (y - 621.5774) * 1.030684; 
            return { m: mStr, h: hYearExact >= 0 ? `${Math.floor(hYearExact) + 1} H` : `${Math.floor(Math.abs(hYearExact))} SH` };
        };

        const generateDataWithAI = async (prompt, onResult, onError) => {
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'generate_ai', data: { prompt } })
                });
                
                const result = await response.json();
                if (result.status === 'success') {
                    let text = result.data;
                    if (text.includes('```json')) text = text.split('```json')[1].split('```')[0].trim();
                    else if (text.includes('```')) text = text.split('```')[1].split('```')[0].trim();
                    onResult(JSON.parse(text));
                } else throw new Error(result.message);
            } catch (err) { onError(err.message); }
        };

        const SmartEdgeMenu = ({ onAddNew }) => {
            const [isOpen, setIsOpen] = useState(false);
            useEffect(() => {
                const closeMenu = () => { if (isOpen) setIsOpen(false); };
                if (isOpen) window.addEventListener('click', closeMenu);
                return () => window.removeEventListener('click', closeMenu);
            }, [isOpen]);

            return (
                <div className="no-select"> 
                    {isOpen && <div className="fixed inset-0 z-[9997] bg-black/5 backdrop-blur-[1px] transition-all"></div>}
                    <div className={`fixed top-1/2 right-0 transform -translate-y-1/2 z-[9998] transition-transform duration-300 cubic-bezier(0.4, 0, 0.2, 1) flex items-center ${isOpen ? 'translate-x-0' : 'translate-x-full'}`} onClick={(e) => e.stopPropagation()}>
                        <div onClick={() => setIsOpen(!isOpen)} className={`absolute -left-10 bg-orange-950/20 backdrop-blur-sm text-orange-700 rounded-l-xl cursor-pointer flex items-center justify-center hover:bg-orange-600 hover:text-white transition-all duration-300 hover:shadow-[-2px_0_10px_rgba(234,88,12,0.2)] ${isOpen ? 'bg-orange-600 text-white' : ''}`} style={{ width: '40px', height: '56px' }}>
                            <div className={`transform transition-transform duration-300 scale-100 ${isOpen ? 'rotate-180' : ''}`}><IconChevronLeft /></div>
                        </div>
                        <div className="w-56 bg-white/95 backdrop-blur-md shadow-[-5px_0_25px_rgba(234,88,12,0.15)] border-l border-y border-orange-100 rounded-l-2xl p-4 flex flex-col gap-2">
                            <div className="text-[10px] font-bold text-orange-400 px-2 py-1 uppercase tracking-wider border-b border-orange-100 mb-2">Tambah Data Baru</div>
                            <button onClick={() => { onAddNew('event'); setIsOpen(false); }} className="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-orange-50 text-gray-700 hover:text-orange-600 transition-colors text-sm font-semibold w-full text-left">
                                <span className="bg-orange-100 p-1.5 rounded-md text-orange-600"><IconBook /></span> Peristiwa
                            </button>
                            <button onClick={() => { onAddNew('figure'); setIsOpen(false); }} className="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-orange-50 text-gray-700 hover:text-orange-600 transition-colors text-sm font-semibold w-full text-left">
                                <span className="bg-orange-100 p-1.5 rounded-md text-orange-600"><IconUsers /></span> Tokoh
                            </button>
                            <button onClick={() => { onAddNew('era'); setIsOpen(false); }} className="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-orange-50 text-gray-700 hover:text-orange-600 transition-colors text-sm font-semibold w-full text-left">
                                <span className="bg-orange-100 p-1.5 rounded-md text-orange-600"><IconDatabase /></span> Era / Periode
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const AlatDashboard = ({ onNavigate }) => (
            <div className="max-w-4xl mx-auto pb-10">
                <div className="mb-6">
                    <h2 className="text-2xl font-bold text-zamania-900 mb-1">Pusat Alat & Data</h2>
                    <p className="text-sm text-gray-500">Akses katalog sejarah spesifik, garis waktu teknologi, atau kalkulator penanggalan.</p>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                    <div onClick={() => onNavigate('events')} className="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-orange-100 hover:border-orange-400 hover:shadow-md cursor-pointer flex flex-col items-center text-center transition-all group">
                        <div className="bg-orange-50 text-orange-600 p-4 rounded-full mb-3 group-hover:scale-110 transition-transform"><IconBook /></div>
                        <h3 className="font-bold text-gray-800 text-sm">Peristiwa</h3>
                        <p className="text-[10px] text-gray-400 mt-1">Katalog Kejadian</p>
                    </div>
                    <div onClick={() => onNavigate('figures')} className="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-orange-100 hover:border-orange-400 hover:shadow-md cursor-pointer flex flex-col items-center text-center transition-all group">
                        <div className="bg-orange-50 text-orange-600 p-4 rounded-full mb-3 group-hover:scale-110 transition-transform"><IconUsers /></div>
                        <h3 className="font-bold text-gray-800 text-sm">Tokoh</h3>
                        <p className="text-[10px] text-gray-400 mt-1">Biografi Sejarah</p>
                    </div>
                    <div onClick={() => onNavigate('eras')} className="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-orange-100 hover:border-orange-400 hover:shadow-md cursor-pointer flex flex-col items-center text-center transition-all group">
                        <div className="bg-orange-50 text-orange-600 p-4 rounded-full mb-3 group-hover:scale-110 transition-transform"><IconDatabase /></div>
                        <h3 className="font-bold text-gray-800 text-sm">Era / Zaman</h3>
                        <p className="text-[10px] text-gray-400 mt-1">Daftar Periode</p>
                    </div>
                    <div onClick={() => onNavigate('tech')} className="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-orange-100 hover:border-orange-400 hover:shadow-md cursor-pointer flex flex-col items-center text-center transition-all group">
                        <div className="bg-orange-50 text-orange-600 p-4 rounded-full mb-3 group-hover:scale-110 transition-transform"><IconCpu /></div>
                        <h3 className="font-bold text-gray-800 text-sm">Teknologi</h3>
                        <p className="text-[10px] text-gray-400 mt-1">Inovasi Zaman</p>
                    </div>
                    <div onClick={() => onNavigate('converter')} className="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-orange-100 hover:border-orange-400 hover:shadow-md cursor-pointer flex flex-col items-center text-center transition-all group">
                        <div className="bg-orange-50 text-orange-600 p-4 rounded-full mb-3 group-hover:scale-110 transition-transform"><IconCalendar /></div>
                        <h3 className="font-bold text-gray-800 text-sm">Kalender</h3>
                        <p className="text-[10px] text-gray-400 mt-1">Konversi Hijriah</p>
                    </div>
                </div>
            </div>
        );

        const TimelineView = ({ items, eras, onCardClick }) => {
            const [activeFilter, setActiveFilter] = useState('Semua'); 
            const [searchQuery, setSearchQuery] = useState('');

            const displayItems = items.filter(item => {
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const title = item.type === 'event' ? item.data.title : item.data.name;
                    const desc = stripHtml(item.data.description || ''); 
                    const cat = item.data.category || '';
                    
                    let yearM = ''; let yearH = '';
                    if (item.type === 'event') { yearM = item.data.displayM || ''; yearH = item.data.displayH || ''; } 
                    else if (item.type === 'birth') { yearM = item.data.displayBirthM || ''; yearH = item.data.displayBirthH || ''; } 
                    else if (item.type === 'death') { yearM = item.data.displayDeathM || ''; yearH = item.data.displayDeathH || ''; }

                    if (!(title.toLowerCase().includes(q) || desc.toLowerCase().includes(q) || cat.toLowerCase().includes(q) || yearM.toLowerCase().includes(q) || yearH.toLowerCase().includes(q))) return false;
                }
                if (activeFilter === 'Semua') return true;
                const cat = item.data.category ? item.data.category.toLowerCase() : '';
                if (activeFilter === 'Islam' && cat.includes('islam')) return true;
                if (activeFilter === 'Nusantara' && cat.includes('nusantara')) return true;
                return false;
            });

            let lastYear = null;

            return (
                <div className="max-w-4xl mx-auto relative pb-10">
                    <div className="mb-6">
                        <h2 className="text-2xl font-bold text-zamania-900 mb-4">Garis Waktu Global</h2>
                        <div className="flex flex-col sm:flex-row justify-between gap-4">
                            <div className="flex flex-wrap gap-2">
                                {['Semua', 'Islam', 'Nusantara'].map(cat => (
                                    <button key={cat} onClick={() => setActiveFilter(cat)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${activeFilter === cat ? 'bg-orange-600 text-white shadow-md' : 'bg-white text-orange-700 border border-orange-200 hover:bg-orange-50'}`}>{cat}</button>
                                ))}
                            </div>
                            <div className="relative w-full sm:w-64">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><IconSearch /></div>
                                <input type="text" placeholder="Cari tahun, tokoh..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 border border-orange-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 bg-white shadow-sm" />
                            </div>
                        </div>
                    </div>

                    <div className="relative timeline-line pt-4">
                        {displayItems.length === 0 ? (
                            <div className="text-center text-gray-500 py-10 bg-white rounded-xl border border-orange-100 shadow-sm">Tidak ada sejarah untuk pencarian ini.</div>
                        ) : displayItems.map((item, index) => {
                            const targetYear = item.type === 'event' ? item.yearMath : (item.type === 'birth' ? item.data.birthMath : item.data.deathMath);
                            const isSameYearAsPrevious = lastYear === targetYear;
                            lastYear = targetYear;

                            return (
                                <div key={index} className={`relative flex flex-col md:flex-row items-center w-full group ${isSameYearAsPrevious ? 'mb-2' : 'mb-8'}`}>
                                    <div className={`absolute left-6 md:left-1/2 rounded-full bg-orange-600 border-white transform -translate-x-1/2 z-10 group-hover:bg-orange-500 transition-colors ${isSameYearAsPrevious ? 'w-2 h-2 border' : 'w-3 h-3 border-2'}`}></div>
                                    
                                    <div className="hidden md:flex w-1/2 justify-end pr-8 text-right flex-col">
                                        {!isSameYearAsPrevious && (
                                            <>
                                                <span className="text-lg font-black text-zamania-900">{item.type === 'event' ? item.data.displayM : (item.type === 'birth' ? item.data.displayBirthM : item.data.displayDeathM)}</span>
                                                <span className="text-xs font-semibold text-orange-600 mt-0.5">{item.type === 'event' ? item.data.displayH : (item.type === 'birth' ? item.data.displayBirthH : item.data.displayDeathH)}</span>
                                            </>
                                        )}
                                    </div>

                                    <div className="w-full pl-12 md:pl-8 md:w-1/2 text-left">
                                        {!isSameYearAsPrevious && (
                                            <div className="md:hidden flex gap-2 items-baseline mb-1">

                    const dateObj = new Date(masehiDate);
                    const dayStr = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(dateObj);
                    const masehiFormatted = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(dateObj);
                    const adjustedDate = new Date(dateObj);
                    adjustedDate.setDate(adjustedDate.getDate() + hijriOffset);
                    const parts = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', { day: 'numeric', month: 'numeric', year: 'numeric' }).formatToParts(adjustedDate);
                    const getPartValue = (type) => { const found = parts.find(p => p.type === type); return found ? found.value : ''; };
                    const hDay = getPartValue('day');
                    const hMonthNum = parseInt(getPartValue('month') || '1', 10);
                    const hYear = getPartValue('year').replace(/\D/g, ''); 
                    const namaBulanHijriah = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Sya'ban", "Ramadhan", "Syawal", "Zulqaidah", "Zulhijjah"];
                    const validatedMonthIndex = isNaN(hMonthNum) || hMonthNum < 1 || hMonthNum > 12 ? 0 : hMonthNum - 1;
                    return { dayStr, masehiFormatted, hijriahFormatted: `${hDay} ${namaBulanHijriah[validatedMonthIndex]} ${hYear} H` };

                    const dateObj = new Date(masehiDate);
                    const dayStr = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(dateObj);

                let items = [];
                events.forEach(e => items.push({ type: 'event', yearMath: e.yearMath, data: e }));
                figures.forEach(f => {
                    if(f.birthMath) items.push({ type: 'birth', yearMath: f.birthMath, data: f });
                    if(f.deathMath) items.push({ type: 'death', yearMath: f.deathMath, data: f });
                });
                return items.sort((a, b) => a.yearMath - b.yearMath);
            }, [events, figures]);

            const saveToDatabase = async (type, data) => {
                const adminPassword = window.prompt("Otorisasi Admin: Masukkan Password untuk Menyimpan/Mengedit data ke Cloud.");
                if (!adminPassword) return; 

                const isUpdate = !!data.id;
                const actionStr = isUpdate ? `update_${type}` : `add_${type}`;
                setSyncStatus(isUpdate ? 'Memperbarui di Cloud...' : 'Menyimpan ke Cloud...');

                try {
                    const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ password: adminPassword, action: actionStr, data: data })
                    });
                    const result = await response.json();

                    if (result.status === 'success') {
                        const savedItem = result.data || data;
                        if (!savedItem.id && !isUpdate) savedItem.id = Date.now(); 

                        if (isUpdate) {
                            if (type === 'event') setEvents(events.map(e => e.id === savedItem.id ? savedItem : e));
                            if (type === 'figure') setFigures(figures.map(f => f.id === savedItem.id ? savedItem : f));
                            if (type === 'era') setEras(eras.map(e => e.id === savedItem.id ? savedItem : e));
                        } else {
                            if (type === 'event') setEvents([...events, savedItem]);
                            if (type === 'figure') setFigures([...figures, savedItem]);
                            if (type === 'era') setEras([...eras, savedItem]);
                        }
                        
                        setSyncStatus('Berhasil Disimpan!');
                        setTimeout(() => { setSyncStatus(''); setActiveMenu('timeline'); setEditingItem(null); setSelectedItem(null); }, 1500);
                    } else { alert("Gagal Menyimpan: " + result.message); setSyncStatus(''); }
                } catch (error) {
                    console.error("Save Error:", error.message);
                    alert("Akses POST diblokir. Pastikan Google Apps Script (Who Has Access) diatur ke 'Anyone'.");
                    setSyncStatus('');
                }
            };

            const handleMenuChange = (menu) => { setSelectedItem(null); setEditingItem(null); setActiveMenu(menu); };
            const handleAddNew = (type) => { setSelectedItem(null); setEditingItem(null); setActiveMenu(`form_${type}`); };
            const handleEditItem = (item) => {
                setSelectedItem(null); setEditingItem(item);
                if (item.type === 'event') setActiveMenu('form_event');
                if (item.type === 'birth' || item.type === 'death') setActiveMenu('form_figure');
                if (item.type === 'era') setActiveMenu('form_era');
            };

            if (isLoadingData) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen bg-zamania-50">
                        <div className="text-orange-500 animate-spin mb-4"><IconClock /></div>
                        <h1 className="text-xl font-extrabold text-orange-600 tracking-widest mb-1">ZAMANIA</h1>
                        <p className="text-orange-800 font-bold animate-pulse text-sm">Membuka Catatan Sejarah...</p>
                    </div>
                );
            }

            if (isError) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen bg-red-50 p-6 text-center">
                        <div className="text-red-500 mb-6 bg-red-100 p-4 rounded-full"><IconGlobe /></div>
                        <h2 className="text-2xl font-black text-red-900 mb-4">Koneksi Database Terputus</h2>
                        <p className="text-red-700 max-w-md mx-auto mb-6">Aplikasi gagal mengambil data dari API Google Apps Script. <strong>Pesan Error: Failed to fetch.</strong></p>
                        <div className="bg-white p-6 rounded-xl border border-red-200 text-left max-w-lg shadow-sm">
                            <button onClick={() => window.location.reload()} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition-colors">Coba Hubungkan Kembali</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-zamania-50">
                    <header className="bg-gradient-to-r from-orange-500 to-orange-600 text-white p-4 shadow-md z-20 flex-shrink-0 flex justify-between items-center border-none">
                        <div>
                            <h1 className="text-xl font-extrabold tracking-tight">ZAMANIA</h1>
                            <p className="text-[10px] text-orange-100 font-semibold tracking-wider uppercase leading-none mt-1">Kalender Sejarah</p>
                        </div>
                        {syncStatus && <div className="absolute top-14 left-1/2 transform -translate-x-1/2 bg-white text-orange-600 px-4 py-1.5 rounded-full text-xs font-bold shadow-lg animate-pulse z-50 border border-orange-200">{syncStatus}</div>}
                    </header>

                    <div className="flex-1 p-4 md:p-6 scrollable-content relative">
                        {selectedItem ? (
                            <DetailView item={selectedItem} onBack={() => setSelectedItem(null)} onEdit={handleEditItem} />
                        ) : (
                            <div>
                                {activeMenu === 'timeline' && <TimelineView items={timelineData} eras={eras} onCardClick={setSelectedItem} />}
                                {activeMenu === 'time_machine' && <TimeMachineView events={events} figures={figures} eras={eras} onCardClick={setSelectedItem} />}
                                {activeMenu === 'alat_home' && <AlatDashboard onNavigate={handleMenuChange} />}
                                {activeMenu === 'events' && <EventsList items={events} onCardClick={item => setSelectedItem({type: 'event', data: item, yearMath: item.yearMath})} onBack={() => handleMenuChange('alat_home')} />}
                                {activeMenu === 'figures' && <FiguresList items={figures} onCardClick={item => setSelectedItem({type: 'birth', data: item, yearMath: item.birthMath})} onBack={() => handleMenuChange('alat_home')} />}
                                {activeMenu === 'eras' && <ErasList items={eras} onCardClick={item => setSelectedItem({type: 'era', data: item, yearMath: item.startMath})} onBack={() => handleMenuChange('alat_home')} />}
                                {activeMenu === 'tech' && <TechView events={events} figures={figures} onCardClick={setSelectedItem} onBack={() => handleMenuChange('alat_home')} />}
                                {activeMenu === 'converter' && <DateConverterView onBack={() => handleMenuChange('alat_home')} />}
                                
                                {activeMenu === 'form_event' && <FormEvent initialData={editingItem?.data} onSave={(data) => saveToDatabase('event', data)} onCancel={() => handleMenuChange('timeline')} />}
                                {activeMenu === 'form_figure' && <FormFigure initialData={editingItem?.data} onSave={(data) => saveToDatabase('figure', data)} onCancel={() => handleMenuChange('timeline')} />}
                                {activeMenu === 'form_era' && <FormEra initialData={editingItem?.data} onSave={(data) => saveToDatabase('era', data)} onCancel={() => handleMenuChange('timeline')} />}
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 bg-gradient-to-r from-orange-600 to-orange-700 bottom-nav-shadow z-40 pb-safe">
                        <div className="max-w-md mx-auto flex justify-between items-center h-16 px-6">
                            <button onClick={() => handleMenuChange('timeline')} className={`flex flex-col items-center justify-center w-full h-full transition-all ${activeMenu === 'timeline' ? 'text-white scale-110 font-bold' : 'text-orange-200 hover:text-white'}`}><IconClock /><span className="text-[10px] font-bold mt-1">Garis Waktu</span></button>
                            <button onClick={() => handleMenuChange('time_machine')} className={`flex flex-col items-center justify-center w-full h-full transition-all ${activeMenu === 'time_machine' ? 'text-white scale-110 font-bold' : 'text-orange-200 hover:text-white'}`}><IconGlobe /><span className="text-[10px] font-bold mt-1">Mesin Waktu</span></button>
                            <button onClick={() => handleMenuChange('alat_home')} className={`flex flex-col items-center justify-center w-full h-full transition-all ${['alat_home', 'events', 'figures', 'eras', 'tech', 'converter'].includes(activeMenu) ? 'text-white scale-110 font-bold' : 'text-orange-200 hover:text-white'}`}><IconGrid /><span className="text-[10px] font-bold mt-1">Alat</span></button>
                        </div>
                    </nav>

                    <SmartEdgeMenu onAddNew={handleAddNew} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
